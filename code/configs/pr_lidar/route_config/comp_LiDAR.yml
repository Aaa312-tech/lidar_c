run:
  random_state: 42
  output_layout_gds_path: "/home/hzhou144/projects/PICRoute/src/picroute/result/layout.gds"

dr:
  router: GridRoute
  maxIteration: 10
  
  net_order: "topo"   # topo, naive
  group: True
  enable_45_neighbor: True
  historyCost: 1000
  ripup_times: 10

  grid_resolution: 2
  bend_radius: 5
  net_bound_scale_factor: 1.5
  net_default_bound: 100

  loss_propagation: 1.5
  loss_bending: 50
  loss_crossing: 200
  loss_congestion: 500

  loss_cr: 0.52
  loss_pp: 0.00015
  loss_bend: 0.005
  loss_comp:
    mzi2x2_2x2_phase_shifter: 1.2
    grating_coupler_elliptical_lumerical: 0.0
    ring_double_heater: 1.2
    straight_heater_metal_undercut: 1.2
    delay_snake2: 0.5
    coupler: 0.3

show_temp: False

eval: "comp"    # noc, comp
il_cross: 0.5
  